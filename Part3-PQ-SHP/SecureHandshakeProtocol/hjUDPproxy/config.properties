# PQ-SHP UDP Proxy Configuration

# PQ-SHP Server Endpoint (where to initiate PQ handshake)
# This is where the server listens for ClientHello
server=localhost:9999

# RTSSP Streaming Server Endpoint (where encrypted media comes from)
# This is where the PQ-SHP server streams encrypted RTSSP packets
remote=localhost:8888

# Local Client Delivery Endpoint (where to forward decrypted packets)
# Configure your media player to listen on this endpoint
localdelivery=localhost:7777

# Movie Name (which movie to request from the server)
movie=cars.dat

